name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            arch: x86_64
          - os: ubuntu-latest
            target: linux-arm64
            arch: aarch64
          # - os: macos-latest
          #   target: macos-x64
          #   arch: x86_64
          # - os: macos-latest
          #   target: macos-arm64
          #   arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-${{ matrix.target }}
          path: agentic

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: agentic-*/*
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
