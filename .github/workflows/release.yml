name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            arch: x86_64
          - os: ubuntu-latest
            target: linux-arm64
            arch: aarch64
          # - os: macos-latest
          #   target: macos-x64
          #   arch: x86_64
          # - os: macos-latest
          #   target: macos-arm64
          #   arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun run build

      - name: Rename binary
        run: mv agentic agentic-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentic-${{ matrix.target }}
          path: agentic-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: List artifacts
        run: find . -type f -name 'agentic-*' | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            agentic-*/agentic-*
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
