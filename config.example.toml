# Claude Code Agent Configuration
# This file is generated by `agentic setup` and can be committed to git
# for reproducible team setups.

[llm]
# LLM provider and model
provider = "anthropic"  # anthropic, openai
model = "claude-opus-4-8"  # Full model identifier
# API key is read from environment (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc)

[project]
# Project metadata
name = "MyApp"
description = "Brief description of the project"
created_at = "2026-07-05"

[team]
# Team context for agent personalization
priority = "type-safety"  # type-safety, speed, compliance, ux, maintainability
size = "small"  # solo, small (2-5), medium (5-20), large (20+)
seniority = "senior"  # junior, mid, senior (helps agents calibrate explanations)
existing_tools = ["github", "linear"]  # Tools already in use

[stack]
# Technology choices
runtime = "bun"  # bun, node, deno, go, python
language = "typescript"  # typescript, javascript, go, python, rust
frameworks = ["hono"]  # hono, express, fastify, gin, flask, etc
orm = "drizzle"  # drizzle, prisma, sqlalchemy, sequelize, etc
database = "sqlite"  # sqlite, postgres, mysql, mongodb, etc
testing = "bun:test"  # vitest, jest, bun:test, pytest, etc
styling = "tailwind"  # tailwind, styled-components, scss, none, etc
state_management = "none"  # redux, zustand, jotai, pinia, none, etc

[claude_code]
# Claude Code specific configuration

[claude_code.agents]
# Which agents to install
architect = true  # Design/architecture decisions
code_reviewer = true  # PR review and code audit
custom = []  # Custom agent names to include

[claude_code.workflows]
# Which workflow templates to install
audit_codebase = true
migrate_in_parallel = true
research_question = true
loop_until_converged = true
judge_panel = true
custom = []  # Custom workflow names

[claude_code.patterns]
# Quality patterns to use in workflows
adversarial_verify = true
perspective_diverse = true
dedup = true
judge_panel = true
cost_aware = true
phase_orchestration = true

[claude_code.memory]
# Persistent memory across sessions
enabled = true
directory = "~/.agentic/memory"
auto_save = true

[install]
# Installation directories
project_root = "."  # Relative to where CLI is run
agentic_dir = ".agentic"  # Where to put agents/skills/workflows
claude_dir = ".claude"  # Claude Code config directory

[install.skills]
# Optional skills to install (language/framework specific)
bun = true
drizzle = true
hono = true
# Add more as needed

[install.rules]
# Which rule files to install
default = true  # Security and access rules
patterns = true  # Quality patterns documentation

[install.hooks]
# Automatic hooks to set up
symlink = true  # Symlink .agentic → .claude

[agent_context]
# Custom context for agent prompts

[agent_context.architect]
# What the architect should know about your project
focus_areas = ["type-safety", "scalability"]
constraints = []  # Technical constraints to consider
success_metrics = ["test coverage", "performance"]

[agent_context.code_reviewer]
# What the code reviewer should know
standards = ["strict type safety", "no silently-failing promises"]
blockers = []  # Things that auto-fail review
priorities = ["correctness", "maintainability"]

[ci_cd]
# CI/CD configuration (for future integration)
provider = "github"  # github, gitlab, circle-ci, etc
enable_checks = true
enable_workflows = false

[conventions]
# Project conventions
commit_format = "conventional"  # conventional, semantic, freeform
branch_naming = "feat/*, fix/*, chore/*"
pr_template = true
changelog = "CHANGELOG.md"

[security]
# Security and compliance settings
require_code_review = true
require_tests = true
require_type_check = true
require_lint = true
store_secrets_in = ".env.local"  # .env.local, vault, 1password, etc
